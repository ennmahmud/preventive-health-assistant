services:

  # ── Database (Postgres 16 + pgvector) ────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elan_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-elan}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Expose locally for DB tools (psql, DBeaver). Remove in prod.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elan} -d ${POSTGRES_DB:-elan}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Defaults — override in .env
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://elan:elan_dev_pw@db:5432/elan}
    volumes:
      # Trained models (mount from host — avoids re-training inside container)
      - ./models/saved:/app/models/saved:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (nginx + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Development override ─────────────────────────────────────────────────────
  # Run with:  docker compose --profile dev up
  backend-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      - DEBUG=true
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://elan:elan_dev_pw@db:5432/elan}
    volumes:
      - .:/app
      - /app/venv          # exclude host venv from bind-mount
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend-dev:
    profiles: [dev]
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # exclude host node_modules from bind-mount
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend-dev:8000
    depends_on:
      - backend-dev

volumes:
  pgdata:
